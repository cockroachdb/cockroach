syntax = "proto3";
package cockroach.util.admission.admissionpb;
option go_package = "github.com/cockroachdb/cockroach/pkg/util/admission/admissionpb";

import "gogoproto/gogo.proto";

// ResourceGroupConfig is the marshaled value stored in
// system.resource_groups.config. Field numbers are wire-stable once the
// migration that introduced this proto has shipped.
message ResourceGroupConfig {
  option (gogoproto.equal) = true;

  // CpuWeight is the relative share of CPU the group is entitled to
  // when contending with other groups. Must be > 0.
  int64 cpu_weight = 1;

  // MaxCpu allows the group to burst to the cluster's maximum
  // available CPU when no other group is contending.
  bool max_cpu = 2;
}
