// On-disk and on-the-wire types for the revision log; see
// revlog-format.md for the format itself.

syntax = "proto3";
package cockroach.revlog.revlogpb;
option go_package = "github.com/cockroachdb/cockroach/pkg/revlog/revlogpb";

import "gogoproto/gogo.proto";
import "kv/kvpb/api.proto";
import "roachpb/data.proto";
import "util/hlc/timestamp.proto";

// Manifest is the close marker for one tick.
message Manifest {
  option (gogoproto.equal) = true;

  // tick_start, tick_end define the tick's coverage interval
  // (tick_start, tick_end]. Both are always set.
  util.hlc.Timestamp tick_start = 1 [(gogoproto.nullable) = false];
  util.hlc.Timestamp tick_end   = 2 [(gogoproto.nullable) = false];

  // files lists the data files contributed to the tick. Read order
  // is governed by File.flush_order.
  repeated File files = 3 [(gogoproto.nullable) = false];

  // stats is the per-tick rollup of File-level stats (best-effort,
  // monitoring only — not required for read correctness).
  Stats stats = 4 [(gogoproto.nullable) = false];

  // inline_tail carries entries the coordinator coalesced from
  // small per-producer flushes (see Coalesce / Flush.coalesce) that
  // were too small to justify a separate data file. Entries are
  // already in (user_key, mvcc_ts) ascending order across all
  // contributors. Readers process inline_tail as a virtual data
  // file at flushorder = max(files.flush_order) + 1, after every
  // real file.
  repeated FlushEntry inline_tail = 5 [(gogoproto.nullable) = false];
}

// Stats summarizes the size of a unit of revlog output. Attached
// to FlushedFile (per-flush, producer-reported) and to Manifest
// (per-tick, coordinator-rolled-up). Best-effort: 0 may mean "no
// events" or, for sst_bytes specifically, "size not measured".
message Stats {
  option (gogoproto.equal) = true;

  // key_count is the number of (user_key, mvcc_ts) entries written.
  int64 key_count = 1;

  // logical_bytes is sum(len(user_key) + len(value) + len(prev_value)).
  int64 logical_bytes = 2;

  // sst_bytes is the on-disk size of the produced SSTable(s);
  // 0 means unmeasured.
  int64 sst_bytes = 3;
}

// File identifies one data file in a tick. The on-disk path is
// reconstructed by the reader from (tick-end, file_id).
message File {
  option (gogoproto.equal) = true;

  int64 file_id     = 1 [(gogoproto.customname) = "FileID"];
  int32 flush_order = 2;
}

// Flush is the producer→coordinator message: data files just
// durably written, in-line coalesce contributions for small
// per-tick batches the producer chose to forward instead of PUT,
// and rangefeed checkpoints observed since the previous Flush.
// All three are paired because every reported checkpoint's covered
// events are, by construction, in the reported files / coalesces.
message Flush {
  repeated FlushedFile                            files       = 1 [(gogoproto.nullable) = false];
  repeated cockroach.roachpb.RangeFeedCheckpoint  checkpoints = 2 [(gogoproto.nullable) = false];
  repeated Coalesce                               coalesces   = 3 [(gogoproto.nullable) = false];
}

// Coalesce is one producer's small per-tick batch forwarded to the
// coordinator instead of PUT as a standalone data file. The
// coordinator merges Coalesces across producers per tick; before
// closing the tick, the merged result is either PUT as a single
// data file (large enough to justify it) or stuffed into
// Manifest.inline_tail (small enough to inline). Entries are
// already (user_key, mvcc_ts) ascending within one Coalesce.
message Coalesce {
  util.hlc.Timestamp tick_end = 1 [(gogoproto.nullable) = false];
  repeated FlushEntry entries = 2 [(gogoproto.nullable) = false];
}

// FlushEntry is one (user_key, mvcc_ts, value, prev_value) tuple in
// the wire / inline-tail encoding. ValueFrame is the SSTable-value
// equivalent (which omits user_key / mvcc_ts because they live in
// the SSTable key); FlushEntry carries them inline because there
// is no enclosing key/value structure.
message FlushEntry {
  option (gogoproto.equal) = true;

  bytes              user_key   = 1;
  util.hlc.Timestamp mvcc_ts    = 2 [(gogoproto.nullable) = false];
  bytes              value      = 3;
  bytes              prev_value = 4;
}

// FlushedFile pairs one data file with its tick and the producer's
// per-file Stats. The coordinator rolls Stats into Manifest.Stats;
// per-file Stats are not retained in the manifest.
message FlushedFile {
  util.hlc.Timestamp tick_end = 1 [(gogoproto.nullable) = false];
  File               file     = 2 [(gogoproto.nullable) = false];
  Stats              stats    = 3 [(gogoproto.nullable) = false];
}

// OpenTicks is the persisted blob of in-flight tick file lists —
// the data files PUT for ticks whose close marker has not yet been
// written. The coordinator persists this alongside its frontier
// (see jobfrontier) so a resumed coordinator can include
// pre-restart files in the eventual close marker.
//
// Stats are not persisted: per-tick Stats in the manifest are
// best-effort/monitoring-only (revlog-format.md §4) and are
// re-rolled imprecisely on resume from whatever the new producers
// contribute.
message OpenTicks {
  repeated OpenTick ticks = 1 [(gogoproto.nullable) = false];
}

message OpenTick {
  util.hlc.Timestamp tick_end = 1 [(gogoproto.nullable) = false];
  repeated File      files    = 2 [(gogoproto.nullable) = false];
}

// Coverage records the spans the log was watching as of one
// coverage epoch. One Coverage proto is written per epoch at
// log/coverage/<effective_from-HLC>; readers pick the entry with
// the largest HLC <= the time they're interested in to learn
// what was covered then.
message Coverage {
  // effective_from is the HLC at which this coverage took effect.
  // Redundant with the object's path-name HLC, but kept inline so
  // a reader holding only the proto bytes can interpret them.
  util.hlc.Timestamp effective_from = 1 [(gogoproto.nullable) = false];

  // scope is a human-readable description of the job's
  // scope-of-data spec (e.g. "cluster", "database:foo",
  // "tables:foo.bar,foo.baz"). Inspection-only — not load-bearing
  // for any reader.
  string scope = 2;

  // spans is the resolved span set effective from effective_from.
  // Their union is what the writer was tracking during this
  // coverage epoch and what data files PUT for it are expected to
  // cover.
  repeated cockroach.roachpb.Span spans = 3 [(gogoproto.nullable) = false];
}

// ValueFrame is the SSTable value payload.
// (user_key, mvcc_ts) live in the SSTable key, not here.
message ValueFrame {
  option (gogoproto.equal) = true;

  // value is the row's new value as raw roachpb.Value bytes.
  bytes value = 1;

  // prev_value is the row's prior value for WithDiff producers;
  // empty for inserts or non-WithDiff producers.
  bytes prev_value = 2;
}
