<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Witness Test: testdata/basic/raft_elect_propose_append_commit.txt</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { font-size: 14px; color: #7f8c8d; margin-bottom: 12px; font-weight: normal; }
h1 a { color: #7f8c8d; text-decoration: none; }
h1 a:hover { text-decoration: underline; }
.nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.nav button { background: #2d2d44; border: 1px solid #444; color: #ccc; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-family: inherit; }
.nav button:hover { background: #3d3d54; }
.nav button:disabled { opacity: 0.3; cursor: default; }
.step-info { color: #aaa; }
.command { color: #82aaff; font-weight: bold; }
.comment { color: #6a9955; margin-bottom: 12px; white-space: pre-wrap; }
.board { margin-bottom: 16px; }
.row { display: flex; align-items: center; padding: 6px 0; gap: 12px; min-height: 38px; }
.row.down { opacity: 0.4; }
.row.down .label::after { content: ' \00D7'; color: #d63838; font-weight: bold; }
.row.leader .label::after { content: ' \2655'; color: #ffd700; }
.row.stale-leader .label::after { content: ' \2655'; color: #d63838; }
.row .label { width: 80px; flex-shrink: 0; color: #82aaff; font-weight: bold; }
.row .label.witness { color: #b388eb; }
.row .log { display: flex; gap: 2px; flex-shrink: 0; }
.row .state { margin-left: auto; color: #aaa; text-align: right; }
.row .state .item { display: inline-block; margin: 0 4px; }
.row .state .sep { color: #555; }
.row .state .item.changed { color: #ffd700; background: rgba(255,215,0,0.12); padding: 1px 5px; border-radius: 2px; }
.row .state .key { color: #888; }
.row .state .val { color: #e0e0e0; }
.row .state .item.changed .key, .row .state .item.changed .val { color: #ffd700; }
.cell { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        border-radius: 3px; font-size: 12px; font-weight: 400; color: #fff;
        border: 1px solid rgba(255,255,255,0.08); }
.cell.changed { font-weight: 800; box-shadow: 0 0 0 2px #ffd700; }
.cell.empty { background: transparent; color: #444; border: 1px dashed #333; }
.cell.synthetic { font-style: italic; }
.output { background: #0d1117; border: 1px solid #333; border-radius: 4px; padding: 10px; white-space: pre-wrap; color: #c9d1d9; margin-top: 8px; }
.output-label { color: #666; font-size: 11px; margin-top: 12px; margin-bottom: 4px; }
</style>
</head>
<body>
<h1><a href=".././">testdata</a> / <a href="./">basic</a> / raft_elect_propose_append_commit.txt</h1>
<div id="app"></div>
<script>
const TRACE = {"testFile":"testdata/basic/raft_elect_propose_append_commit.txt","steps":[{"index":0,"command":"setup","input":"v1: [a1]\nv2: [a1 b2]","comment":"Basic raft interactions: elections, proposals, replication, leader transitions.\nNo witness — witness interactions belong in scenario/.","output":"v1: [a1] term=a\nv2: [a1 b2] term=b","voters":{"v1":{"log":[{"term":"a","index":"1"}],"term":"a","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2)","matchIndex":0,"down":false},"v2":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"}],"term":"b","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2)","matchIndex":0,"down":false}}},{"index":1,"command":"campaign v2","comment":"v2 campaigns. Its log is more up-to-date, everyone votes yes.","output":"v2 campaigns at term c\nv2: yes (self)\nv1:\n  - term advance a -\u003e c\n  - granted vote for v2 at term c\n  yes (term a-\u003ec, voted v2)\noutcome: won","voters":{"v1":{"term":"c","votedFor":"v2"},"v2":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"}],"term":"c","votedFor":"v2","leader":true,"matchIndex":3}},"messages":[{"from":"v2","to":"v1","type":"VoteReq","label":"VoteReq(term=c, log=b2)"},{"from":"v1","to":"v2","type":"VoteResp","label":"yes","trace":["term advance a -\u003e c","granted vote for v2 at term c"]}]},{"index":2,"command":"propose v2","comment":"Propose and replicate. Both voters have the entries, quorum reached.","output":"v1: [a1] term=c\nv2: [a1 b2 c3 c4] term=c leader","voters":{"v2":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"},{"term":"c","index":"4"}],"matchIndex":4}}},{"index":3,"command":"append v2","output":"v2 appends through c4\nv1:\n  - accepted append through c4 (ok)\n  ok (log=[a1 | b2 c3 c4])\nv1: [a1 b2 c3 c4] term=c\nv2: [a1 b2 c3 c4] term=c committed=c4 leader","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"},{"term":"c","index":"4"}]},"v2":{"committed":4}},"messages":[{"from":"v2","to":"v1","type":"AppendReq","label":"AppendReq([... c4])"},{"from":"v1","to":"v2","type":"AppendResp","label":"ok","trace":["accepted append through c4 (ok)"]}]},{"index":4,"command":"campaign v1","comment":"Leader transition: v1 campaigns. Logs match, all yes.","output":"v1 campaigns at term d\nv1: yes (self)\nv2:\n  - term advance c -\u003e d\n  - stepped down as leader\n  - granted vote for v1 at term d\n  yes (term c-\u003ed, voted v1, stepped down)\noutcome: won","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"},{"term":"c","index":"4"},{"term":"d","index":"5"}],"term":"d","votedFor":"v1","leader":true,"matchIndex":5},"v2":{"term":"d","votedFor":"v1","leader":false}},"messages":[{"from":"v1","to":"v2","type":"VoteReq","label":"VoteReq(term=d, log=c4)"},{"from":"v2","to":"v1","type":"VoteResp","label":"yes","trace":["term advance c -\u003e d","stepped down as leader","granted vote for v1 at term d"]}]},{"index":5,"command":"propose v1","output":"v1: [a1 b2 c3 c4 d5 d6] term=d leader\nv2: [a1 b2 c3 c4] term=d","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"},{"term":"c","index":"4"},{"term":"d","index":"5"},{"term":"d","index":"6"}],"matchIndex":6}}},{"index":6,"command":"append v1","output":"v1 appends through d6\nv2:\n  - accepted append through d6 (ok)\n  ok (log=[... c4 | d5 d6])\nv1: [a1 b2 c3 c4 d5 d6] term=d committed=d6 leader\nv2: [a1 b2 c3 c4 d5 d6] term=d","voters":{"v1":{"committed":6},"v2":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"c","index":"3"},{"term":"c","index":"4"},{"term":"d","index":"5"},{"term":"d","index":"6"}]}},"messages":[{"from":"v1","to":"v2","type":"AppendReq","label":"AppendReq([... d6])"},{"from":"v2","to":"v1","type":"AppendResp","label":"ok","trace":["accepted append through d6 (ok)"]}]}]};

let currentStep = 0;

const MAX_CELLS = 10;

function computeState(upTo) {
  const state = { voters: {}, witness: null };
  for (let i = 0; i <= upTo; i++) {
    const step = TRACE.steps[i];
    if (step.voters) {
      for (const [id, delta] of Object.entries(step.voters)) {
        if (!state.voters[id]) state.voters[id] = {};
        for (const [k, v] of Object.entries(delta)) {
          state.voters[id][k] = v;
        }
      }
    }
    if (step.witness) {
      if (!state.witness) state.witness = { vote: {}, acked: {} };
      if (step.witness.vote) {
        for (const [k, v] of Object.entries(step.witness.vote)) {
          state.witness.vote[k] = v;
        }
      }
      if (step.witness.acked) {
        for (const [k, v] of Object.entries(step.witness.acked)) {
          state.witness.acked[k] = v;
        }
      }
      if (step.witness.down !== undefined) {
        state.witness.down = step.witness.down;
      }
    }
  }
  return state;
}



function termBg(t) {
  if (!t || t === '-') return '#2a2a3e';
  let ord = 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') ord = t.charCodeAt(0) - 97;
  else ord = parseInt(t, 10) || 0;
  const hue = (ord * 53) % 360;
  return 'hsl(' + hue + ', 55%, 38%)';
}

function termOrd(t) {
  if (!t || t === '-') return 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') return t.charCodeAt(0) - 96;
  return parseInt(t, 10) || 0;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}



function renderVoterLog(log, prevLog, initial) {
  let html = '<div class="log">';
  if (!log || log.length === 0) {
    html += '<div class="cell empty">·</div>';
  } else {
    for (let i = 0; i < log.length; i++) {
      const e = log[i];
      const prev = prevLog && prevLog[i];
      const changed = !initial && (!prev || prev.term !== e.term || prev.index !== e.index);
      const cls = 'cell' + (changed ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + termBg(e.term) + '">' +
        escHtml(e.index) + '</div>';
    }
  }
  html += '</div>';
  return html;
}








function renderWitnessLog(witness, prevWitness, initial) {
  const hi = witness && witness.acked && witness.acked.hi;
  const engaged = witness && witness.acked && witness.acked.engaged;
  const term = hi ? hi.term : null;
  const idx = hi ? parseInt(hi.index, 10) : 0;

  const prevHi = prevWitness && prevWitness.acked && prevWitness.acked.hi;
  const prevEngaged = prevWitness && prevWitness.acked && prevWitness.acked.engaged;
  const prevTerm = prevHi ? prevHi.term : null;
  const prevIdx = prevHi ? parseInt(prevHi.index, 10) : 0;

  
  const cellChanged = (i) => {
    if (initial) return false;
    if (term !== prevTerm) return true; 
    if (engaged && !prevEngaged) {
      
      return i > prevIdx;
    }
    if (!engaged && prevEngaged) return true; 
    return i > prevIdx;
  };

  let html = '<div class="log">';
  if (!hi && !engaged) {
    html += '<div class="cell empty">·</div></div>';
    return html;
  }
  const bg = termBg(term);
  if (engaged) {
    for (let i = 1; i <= 8; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
    const tailCls = (!initial && engaged && !prevEngaged) ? ' changed' : '';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">…</div>';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">∞</div>';
  } else {
    for (let i = 1; i <= idx; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
  }
  html += '</div>';
  return html;
}


function voterStateItems(id, voter, step) {
  const items = [];
  const push = (key, val, changed) => items.push({ key, val, changed });
  push('term', voter.term || '-', isVoterChanged(step, id, 'term'));
  if (voter.votedFor && voter.votedFor !== '-') {
    push('votedFor', voter.votedFor, isVoterChanged(step, id, 'votedFor'));
  } else if (isVoterChanged(step, id, 'votedFor')) {
    push('votedFor', '-', true);
  }
  if ((voter.committed || 0) > 0 || isVoterChanged(step, id, 'committed')) {
    push('committed', voter.committed || 0, isVoterChanged(step, id, 'committed'));
  }
  if (voter.witnessEngaged) {
    push('witnessEngaged', 'yes', isVoterChanged(step, id, 'witnessEngaged'));
  } else if (isVoterChanged(step, id, 'witnessEngaged')) {
    push('witnessEngaged', 'no', true);
  }
  return items;
}

function witnessStateItems(witness, step) {
  const items = [];
  const initial = currentStep === 0;
  const voteTermChanged = !initial && step.witness && step.witness.vote && step.witness.vote.term !== undefined;
  const voteForChanged = !initial && step.witness && step.witness.vote && step.witness.vote.votedFor !== undefined;
  const hiChanged = !initial && step.witness && step.witness.acked && step.witness.acked.hi !== undefined;
  const engagedChanged = !initial && step.witness && step.witness.acked && step.witness.acked.engaged !== undefined;

  items.push({
    key: 'voteTerm', val: witness.vote.term || '-', changed: !!voteTermChanged,
  });
  items.push({
    key: 'votedFor', val: witness.vote.votedFor || '-', changed: !!voteForChanged,
  });
  if (witness.acked.hi) {
    items.push({
      key: 'hi', val: witness.acked.hi.term + witness.acked.hi.index, changed: !!hiChanged,
    });
  }
  items.push({
    key: 'engaged', val: witness.acked.engaged ? 'yes' : 'no', changed: !!engagedChanged,
  });
  return items;
}

function fmtStateItems(items) {
  return items.map(it => {
    const cls = 'item' + (it.changed ? ' changed' : '');
    return '<span class="' + cls + '"><span class="key">' + escHtml(it.key) + '=</span>' +
      '<span class="val">' + escHtml(it.val) + '</span></span>';
  }).join('<span class="sep">,</span>');
}

function isVoterChanged(step, id, field) {
  if (currentStep === 0) return false; 
  return step.voters && step.voters[id] && step.voters[id][field] !== undefined;
}

function renderVoterRow(id, voter, step, prevVoter, allVoters) {
  let cls = 'row';
  if (voter.down) cls += ' down';
  if (voter.leader) {
    const stale = Object.values(allVoters).some(
      v => v !== voter && termOrd(v.term) > termOrd(voter.term)
    );
    cls += stale ? ' stale-leader' : ' leader';
  }
  let html = '<div class="' + cls + '" data-id="' + id + '">';
  html += '<div class="label">' + escHtml(id) + '</div>';
  html += renderVoterLog(voter.log, prevVoter ? prevVoter.log : null, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(voterStateItems(id, voter, step)) + '</div>';
  html += '</div>';
  return html;
}

function renderWitnessRow(witness, step, prevWitness) {
  let cls = 'row';
  if (witness.down) cls += ' down';
  let html = '<div class="' + cls + '" data-id="w">';
  html += '<div class="label witness">w</div>';
  html += renderWitnessLog(witness, prevWitness, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(witnessStateItems(witness, step)) + '</div>';
  html += '</div>';
  return html;
}

function render() {
  const step = TRACE.steps[currentStep];
  const state = computeState(currentStep);
  const prevState = currentStep > 0 ? computeState(currentStep - 1) : null;

  let html = '';

  
  html += '<div class="nav">';
  html += '<button onclick="go(-1)" id="btn-prev">&larr;</button>';
  html += '<span class="step-info">Step ' + (currentStep + 1) + '/' + TRACE.steps.length + '</span>';
  html += '<button onclick="go(1)" id="btn-next">&rarr;</button>';
  html += '<span class="command">' + escHtml(step.command) + '</span>';
  html += '</div>';

  
  html += '<div class="board">';
  const voterIds = Object.keys(state.voters).sort();
  for (const id of voterIds) {
    const prev = prevState && prevState.voters[id];
    html += renderVoterRow(id, state.voters[id], step, prev, state.voters);
  }
  if (state.witness) {
    html += renderWitnessRow(state.witness, step, prevState && prevState.witness);
  }
  html += '</div>';

  
  if (step.comment) {
    html += '<div class="comment">' + escHtml(step.comment) + '</div>';
  }

  
  html += '<div class="output-label">input</div>';
  let inputText = step.command;
  if (step.input) inputText += '\n' + step.input;
  html += '<div class="output">' + escHtml(inputText) + '</div>';

  
  html += '<div class="output-label">output</div>';
  html += '<div class="output">' + escHtml(step.output) + '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === TRACE.steps.length - 1;
}

function go(delta) {
  const next = currentStep + delta;
  if (next >= 0 && next < TRACE.steps.length) {
    currentStep = next;
    location.hash = currentStep;
    render();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});


const hashStep = parseInt(location.hash.slice(1), 10);
if (hashStep >= 0 && hashStep < TRACE.steps.length) currentStep = hashStep;
render();
</script>
