let currentStep = 0;

const MAX_CELLS = 10;

function computeState(upTo) {
  const state = { voters: {}, witness: null };
  for (let i = 0; i <= upTo; i++) {
    const step = TRACE.steps[i];
    if (step.voters) {
      for (const [id, delta] of Object.entries(step.voters)) {
        if (!state.voters[id]) state.voters[id] = {};
        for (const [k, v] of Object.entries(delta)) {
          state.voters[id][k] = v;
        }
      }
    }
    if (step.witness) {
      if (!state.witness) state.witness = { vote: {}, acked: {} };
      if (step.witness.vote) {
        for (const [k, v] of Object.entries(step.witness.vote)) {
          state.witness.vote[k] = v;
        }
      }
      if (step.witness.acked) {
        for (const [k, v] of Object.entries(step.witness.acked)) {
          state.witness.acked[k] = v;
        }
      }
      if (step.witness.down !== undefined) {
        state.witness.down = step.witness.down;
      }
    }
  }
  return state;
}



function termBg(t) {
  if (!t || t === '-') return '#2a2a3e';
  let ord = 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') ord = t.charCodeAt(0) - 97;
  else ord = parseInt(t, 10) || 0;
  const hue = (ord * 53) % 360;
  return 'hsl(' + hue + ', 55%, 38%)';
}

function termOrd(t) {
  if (!t || t === '-') return 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') return t.charCodeAt(0) - 96;
  return parseInt(t, 10) || 0;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}



function renderVoterLog(log, prevLog, initial) {
  let html = '<div class="log">';
  if (!log || log.length === 0) {
    html += '<div class="cell empty">·</div>';
  } else {
    for (let i = 0; i < log.length; i++) {
      const e = log[i];
      const prev = prevLog && prevLog[i];
      const changed = !initial && (!prev || prev.term !== e.term || prev.index !== e.index);
      const cls = 'cell' + (changed ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + termBg(e.term) + '">' +
        escHtml(e.index) + '</div>';
    }
  }
  html += '</div>';
  return html;
}








function renderWitnessLog(witness, prevWitness, initial) {
  const hi = witness && witness.acked && witness.acked.hi;
  const engaged = witness && witness.acked && witness.acked.engaged;
  const term = hi ? hi.term : null;
  const idx = hi ? parseInt(hi.index, 10) : 0;

  const prevHi = prevWitness && prevWitness.acked && prevWitness.acked.hi;
  const prevEngaged = prevWitness && prevWitness.acked && prevWitness.acked.engaged;
  const prevTerm = prevHi ? prevHi.term : null;
  const prevIdx = prevHi ? parseInt(prevHi.index, 10) : 0;

  
  const cellChanged = (i) => {
    if (initial) return false;
    if (term !== prevTerm) return true; 
    if (engaged && !prevEngaged) {
      
      return i > prevIdx;
    }
    if (!engaged && prevEngaged) return true; 
    return i > prevIdx;
  };

  let html = '<div class="log">';
  if (!hi && !engaged) {
    html += '<div class="cell empty">·</div></div>';
    return html;
  }
  const bg = termBg(term);
  if (engaged) {
    for (let i = 1; i <= 8; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
    const tailCls = (!initial && engaged && !prevEngaged) ? ' changed' : '';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">…</div>';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">∞</div>';
  } else {
    for (let i = 1; i <= idx; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
  }
  html += '</div>';
  return html;
}


function voterStateItems(id, voter, step) {
  const items = [];
  const push = (key, val, changed) => items.push({ key, val, changed });
  push('term', voter.term || '-', isVoterChanged(step, id, 'term'));
  if (voter.votedFor && voter.votedFor !== '-') {
    push('votedFor', voter.votedFor, isVoterChanged(step, id, 'votedFor'));
  } else if (isVoterChanged(step, id, 'votedFor')) {
    push('votedFor', '-', true);
  }
  if ((voter.committed || 0) > 0 || isVoterChanged(step, id, 'committed')) {
    push('committed', voter.committed || 0, isVoterChanged(step, id, 'committed'));
  }
  if (voter.witnessEngaged) {
    push('witnessEngaged', 'yes', isVoterChanged(step, id, 'witnessEngaged'));
  } else if (isVoterChanged(step, id, 'witnessEngaged')) {
    push('witnessEngaged', 'no', true);
  }
  return items;
}

function witnessStateItems(witness, step) {
  const items = [];
  const initial = currentStep === 0;
  const voteTermChanged = !initial && step.witness && step.witness.vote && step.witness.vote.term !== undefined;
  const voteForChanged = !initial && step.witness && step.witness.vote && step.witness.vote.votedFor !== undefined;
  const hiChanged = !initial && step.witness && step.witness.acked && step.witness.acked.hi !== undefined;
  const engagedChanged = !initial && step.witness && step.witness.acked && step.witness.acked.engaged !== undefined;

  items.push({
    key: 'voteTerm', val: witness.vote.term || '-', changed: !!voteTermChanged,
  });
  items.push({
    key: 'votedFor', val: witness.vote.votedFor || '-', changed: !!voteForChanged,
  });
  if (witness.acked.hi) {
    items.push({
      key: 'hi', val: witness.acked.hi.term + witness.acked.hi.index, changed: !!hiChanged,
    });
  }
  items.push({
    key: 'engaged', val: witness.acked.engaged ? 'yes' : 'no', changed: !!engagedChanged,
  });
  return items;
}

function fmtStateItems(items) {
  return items.map(it => {
    const cls = 'item' + (it.changed ? ' changed' : '');
    return '<span class="' + cls + '"><span class="key">' + escHtml(it.key) + '=</span>' +
      '<span class="val">' + escHtml(it.val) + '</span></span>';
  }).join('<span class="sep">,</span>');
}

function isVoterChanged(step, id, field) {
  if (currentStep === 0) return false; 
  return step.voters && step.voters[id] && step.voters[id][field] !== undefined;
}

function renderVoterRow(id, voter, step, prevVoter, allVoters) {
  let cls = 'row';
  if (voter.down) cls += ' down';
  if (voter.leader) {
    const stale = Object.values(allVoters).some(
      v => v !== voter && termOrd(v.term) > termOrd(voter.term)
    );
    cls += stale ? ' stale-leader' : ' leader';
  }
  let html = '<div class="' + cls + '" data-id="' + id + '">';
  html += '<div class="label">' + escHtml(id) + '</div>';
  html += renderVoterLog(voter.log, prevVoter ? prevVoter.log : null, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(voterStateItems(id, voter, step)) + '</div>';
  html += '</div>';
  return html;
}

function renderWitnessRow(witness, step, prevWitness) {
  let cls = 'row';
  if (witness.down) cls += ' down';
  let html = '<div class="' + cls + '" data-id="w">';
  html += '<div class="label witness">w</div>';
  html += renderWitnessLog(witness, prevWitness, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(witnessStateItems(witness, step)) + '</div>';
  html += '</div>';
  return html;
}

function render() {
  const step = TRACE.steps[currentStep];
  const state = computeState(currentStep);
  const prevState = currentStep > 0 ? computeState(currentStep - 1) : null;

  let html = '';

  
  html += '<div class="nav">';
  html += '<button onclick="go(-1)" id="btn-prev">&larr;</button>';
  html += '<span class="step-info">Step ' + (currentStep + 1) + '/' + TRACE.steps.length + '</span>';
  html += '<button onclick="go(1)" id="btn-next">&rarr;</button>';
  html += '<span class="command">' + escHtml(step.command) + '</span>';
  html += '</div>';

  
  html += '<div class="board">';
  const voterIds = Object.keys(state.voters).sort();
  for (const id of voterIds) {
    const prev = prevState && prevState.voters[id];
    html += renderVoterRow(id, state.voters[id], step, prev, state.voters);
  }
  if (state.witness) {
    html += renderWitnessRow(state.witness, step, prevState && prevState.witness);
  }
  html += '</div>';

  
  if (step.comment) {
    html += '<div class="comment">' + escHtml(step.comment) + '</div>';
  }

  
  html += '<div class="output-label">input</div>';
  let inputText = step.command;
  if (step.input) inputText += '\n' + step.input;
  html += '<div class="output">' + escHtml(inputText) + '</div>';

  
  html += '<div class="output-label">output</div>';
  html += '<div class="output">' + escHtml(step.output) + '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === TRACE.steps.length - 1;
}

function go(delta) {
  const next = currentStep + delta;
  if (next >= 0 && next < TRACE.steps.length) {
    currentStep = next;
    location.hash = currentStep;
    render();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});


const hashStep = parseInt(location.hash.slice(1), 10);
if (hashStep >= 0 && hashStep < TRACE.steps.length) currentStep = hashStep;
render();
</script>
</body>
</html>
