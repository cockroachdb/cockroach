":"w","type":"PreVoteReq","label":"PreVoteReq(term=c, log=b4)"},{"from":"w","to":"v2","type":"VoteResp","label":"no","trace":["INFO engaged: effectiveHi inflated to b∞","INFO rejected vote for v2: log not up to date (effectiveHi b∞ \u003e lm b4)"]}]},{"index":12,"command":"set-avail down=(v1) up=(v3)","comment":"v1 goes down. v3 comes up in its stead, but this is not enough.","output":"ok","voters":{"v1":{"down":true},"v3":{"down":false}}},{"index":13,"command":"prevote v2","comment":"The best candidate is v2, but even it can't win because the witness\nis still engaged at the previous term.","output":"v2 prevotes at term c\nv2: yes (self)\nv1: (dropped)\nv3: yes\nv4: (dropped)\nw:\n  - INFO engaged: effectiveHi inflated to b∞\n  - INFO rejected vote for v2: log not up to date (effectiveHi b∞ \u003e lm b4)\n  no\noutcome: lost","messages":[{"from":"v2","to":"v1","type":"PreVoteReq","label":"PreVoteReq(term=c, log=b4)"},{"from":"v1","to":"v2","type":"Dropped","label":"(dropped)","dropped":true},{"from":"v2","to":"v3","type":"PreVoteReq","label":"PreVoteReq(term=c, log=b4)"},{"from":"v3","to":"v2","type":"VoteResp","label":"yes"},{"from":"v2","to":"v4","type":"PreVoteReq","label":"PreVoteReq(term=c, log=b4)"},{"from":"v4","to":"v2","type":"Dropped","label":"(dropped)","dropped":true},{"from":"v2","to":"w","type":"PreVoteReq","label":"PreVoteReq(term=c, log=b4)"},{"from":"w","to":"v2","type":"VoteResp","label":"no","trace":["INFO engaged: effectiveHi inflated to b∞","INFO rejected vote for v2: log not up to date (effectiveHi b∞ \u003e lm b4)"]}]},{"index":14,"command":"set-avail up=(v4)","comment":"We need a traditional quorum to forcibly release the witness.","output":"ok","voters":{"v4":{"down":false}}},{"index":15,"command":"campaign v2","comment":"v2 can win, though the witness rejected the vote (as it should) and remains\nengaged at the old term.","output":"v2 campaigns at term c\nv2: yes (self)\nv1: (dropped)\nv3: yes\nv4: yes\nw:\n  - INFO engaged: effectiveHi in let currentStep = 0;

const CARD_W = 180;
const CARD_H = 180;

function computeState(upTo) {
  const state = { voters: {}, witness: null };
  for (let i = 0; i <= upTo; i++) {
    const step = TRACE.steps[i];
    if (step.voters) {
      for (const [id, delta] of Object.entries(step.voters)) {
        if (!state.voters[id]) state.voters[id] = {};
        for (const [k, v] of Object.entries(delta)) {
          state.voters[id][k] = v;
        }
      }
    }
    if (step.witness) {
      if (!state.witness) state.witness = { vote: {}, acked: {} };
      if (step.witness.vote) {
        for (const [k, v] of Object.entries(step.witness.vote)) {
          state.witness.vote[k] = v;
        }
      }
      if (step.witness.acked) {
        for (const [k, v] of Object.entries(step.witness.acked)) {
          state.witness.acked[k] = v;
        }
      }
      if (step.witness.down !== undefined) {
        state.witness.down = step.witness.down;
      }
    }
  }
  return state;
}




function semicircleLayout(voterIds, hasWitness) {
  const n = voterIds.length + (hasWitness ? 1 : 0);
  if (n === 0) return [];

  
  const arenaW = Math.max(n * (CARD_W + 220), 600);
  const radius = (arenaW - CARD_W) / 2;
  const cx = arenaW / 2;
  const cy = radius + CARD_H / 2;

  if (n === 1) {
    
    const id = hasWitness ? 'w' : voterIds[0];
    return { positions: [{ id, x: cx - CARD_W / 2, y: 0 }], arenaW, arenaH: CARD_H + 20 };
  }

  
  const slots = [];
  for (let i = 0; i < n; i++) {
    slots.push(Math.PI * (1 - i / (n - 1)));
  }

  
  const ids = [...voterIds];
  if (hasWitness) {
    
    let bestIdx = 0;
    let bestDist = Infinity;
    for (let i = 0; i <= ids.length; i++) {
      const angle = slots[i];
      const dist = Math.abs(angle - Math.PI / 2);
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    }
    ids.splice(bestIdx, 0, 'w');
  }

  const positions = [];
  let minY = Infinity;
  for (let i = 0; i < n; i++) {
    const angle = slots[i];
    const x = cx + radius * Math.cos(angle) - CARD_W / 2;
    const y = cy - radius * Math.sin(angle) - CARD_H / 2;
    if (y < minY) minY = y;
    positions.push({ id: ids[i], x, y });
  }

  
  for (const p of positions) p.y -= minY;
  const arenaH = cy - minY + CARD_H / 2 + 10;

  return { positions, arenaW, arenaH };
}







function renderMessageArcs(messages, posMap, arenaW, arenaH) {
  if (!messages || messages.length === 0) return '';

  
  const pairs = [];
  for (let i = 0; i + 1 < messages.length; i += 2) {
    pairs.push({ req: messages[i], resp: messages[i + 1] });
  }

  
  const pairKey = (a, b) => a < b ? a + '-' + b : b + '-' + a;
  const countPerPair = {};
  const indexPerPair = {};
  for (const p of pairs) {
    const k = pairKey(p.req.from, p.req.to);
    countPerPair[k] = (countPerPair[k] || 0) + 1;
  }

  let arcs = '';

  for (const p of pairs) {
    const k = pairKey(p.req.from, p.req.to);
    indexPerPair[k] = (indexPerPair[k] || 0);
    const pairIdx = indexPerPair[k]++;

    const fromPos = posMap[p.req.from];
    const toPos = posMap[p.req.to];
    if (!fromPos || !toPos) continue;

    
    const baseSag = 35;
    const sagStep = 25;
    const sag = baseSag + pairIdx * sagStep;

    
    const reqDropped = p.resp.dropped;
    arcs += makeArc(fromPos, toPos, sag, p.req.label,
      'req' + (reqDropped ? ' dropped' : ''), reqDropped ? '#666' : '#5a9');

    
    if (!p.resp.dropped) {
      arcs += makeArc(toPos, fromPos, -sag * 0.7, p.resp.label,
        'resp', '#a75');
    }
  }

  return '<svg class="msg-svg" width="' + arenaW + '" height="' + arenaH + '">' +
    arcs + '</svg>';
}





function makeArc(from, to, sag, label, cls, color) {
  const mx = (from.x + to.x) / 2;
  const my = (from.y + to.y) / 2;

  const dx = to.x - from.x;
  const dy = to.y - from.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return '';

  
  
  let px = -dy / len;
  let py = dx / len;
  
  if (py > 0) { px = -px; py = -py; }

  const qx = mx + px * sag;
  const qy = my + py * sag;

  
  const shortenPx = 40;
  const t0 = shortenPx / len;
  const t1 = 1 - t0;
  const sx = from.x + dx * t0;
  const sy = from.y + dy * t0;
  const ex = from.x + dx * t1;
  const ey = from.y + dy * t1;

  const path = 'M' + sx + ',' + sy + ' Q' + qx + ',' + qy + ' ' + ex + ',' + ey;

  
  const midX = 0.25 * sx + 0.5 * qx + 0.25 * ex;
  const midY = 0.25 * sy + 0.5 * qy + 0.25 * ey;

  
  const tmx = ex - sx;
  const tmy = ey - sy;
  const tmLen = Math.sqrt(tmx * tmx + tmy * tmy);
  const tux = tmLen > 0 ? tmx / tmLen : 1;
  const tuy = tmLen > 0 ? tmy / tmLen : 0;

  
  const arrowLen = 7;
  const arrowW = 4;
  const ax1 = midX - tux * arrowLen + tuy * arrowW;
  const ay1 = midY - tuy * arrowLen - tux * arrowW;
  const ax2 = midX - tux * arrowLen - tuy * arrowW;
  const ay2 = midY - tuy * arrowLen + tux * arrowW;

  
  let angleDeg = Math.atan2(tmy, tmx) * 180 / Math.PI;
  if (angleDeg > 90) angleDeg -= 180;
  if (angleDeg < -90) angleDeg += 180;

  
  const offsetDist = sag > 0 ? -8 : 12;
  const angleRad = angleDeg * Math.PI / 180;
  const olx = midX + Math.sin(angleRad) * offsetDist;
  const oly = midY - Math.cos(angleRad) * offsetDist;

  return '<path class="msg-arc ' + cls + '" d="' + path + '"/>' +
    '<polygon points="' + midX + ',' + midY + ' ' + ax1 + ',' + ay1 + ' ' + ax2 + ',' + ay2 + '" fill="' + color + '"/>' +
    '<text class="msg-label" x="' + olx + '" y="' + oly + '" ' +
    'text-anchor="middle" ' +
    'transform="rotate(' + angleDeg + ' ' + olx + ' ' + oly + ')">' +
    escHtmlAttr(label) + '</text>';
}

function escHtmlAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function isChanged(step, replicaId, field) {
  if (replicaId === 'w') {
    if (!step.witness) return false;
    if (field === 'down') return step.witness.down !== undefined;
    if (field.startsWith('vote.')) return step.witness.vote && step.witness.vote[field.slice(5)] !== undefined;
    if (field.startsWith('acked.')) return step.witness.acked && step.witness.acked[field.slice(6)] !== undefined;
    return false;
  }
  return step.voters && step.voters[replicaId] && step.voters[replicaId][field] !== undefined;
}

function fmtLog(log, prevLog) {
  if (!log || log.length === 0) return '(empty)';
  return log.map((e, i) => {
    const txt = e.term + e.index;
    const prev = prevLog && prevLog[i];
    const changed = !prev || prev.term !== e.term || prev.index !== e.index;
    return '<span class="log-entry' + (changed ? ' changed' : '') + '">' + txt + '</span>';
  }).join(' ');
}

function termOrd(t) {
  if (!t || t === '-') return 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') return t.charCodeAt(0) - 96;
  return parseInt(t, 10) || 0;
}

function fmtLogMark(lm) {
  if (!lm) return '-';
  return lm.term + lm.index;
}

function renderVoterCard(id, voter, step, x, y, allVoters, prevVoter) {
  const f = (key, val) => {
    const cls = isChanged(step, id, key) ? ' changed' : '';
    return '<div class="field' + cls + '"><span class="key">' + key + '</span><span class="val">' + val + '</span></div>';
  };
  let cls = '';
  if (voter.down) cls += ' down';
  if (voter.leader) {
    const stale = Object.values(allVoters).some(v => v !== voter && termOrd(v.term) > termOrd(voter.term));
    cls += stale ? ' stale-leader' : ' leader';
  }
  const style = 'left:' + x + 'px;top:' + y + 'px;height:' + CARD_H + 'px';
  const prevLog = prevVoter ? prevVoter.log : null;
  let html = '<div class="card' + cls + '" style="' + style + '"><h2>' + id + '</h2>';
  html += '<div class="field"><span class="key">log</span><span class="log-entries">' + fmtLog(voter.log, prevLog) + '</span></div>';
  html += f('term', voter.term || '-');
  html += f('votedFor', voter.votedFor || '-');
  html += f('committed', voter.committed || 0);
  if (voter.witnessEngaged) html += f('witnessEngaged', 'yes');
  html += '</div>';
  return html;
}

function renderWitnessCard(witness, step, x, y) {
  if (!witness) return '';
  const f = (field, val) => {
    const cls = isChanged(step, 'w', field) ? ' changed' : '';
    return '<div class="field' + cls + '"><span class="key">' + field.split('.')[1] + '</span><span class="val">' + val + '</span></div>';
  };
  const downCls = witness.down ? ' down' : '';
  const style = 'left:' + x + 'px;top:' + y + 'px;height:' + CARD_H + 'px';
  let html = '<div class="card' + downCls + '" style="' + style + '"><h2>w (witness)</h2>';
  html += '<div style="color:#666;font-size:11px;margin-bottom:4px">vote</div>';
  html += f('vote.term', witness.vote.term || '-');
  html += f('vote.votedFor', witness.vote.votedFor || '-');
  html += '<div style="color:#666;font-size:11px;margin-top:6px;margin-bottom:4px">acked</div>';
  html += f('acked.hi', witness.acked.hi ? fmtLogMark(witness.acked.hi) : '-');
  html += f('acked.engaged', witness.acked.engaged ? 'yes' : 'no');
  html += '</div>';
  return html;
}

function render() {
  const step = TRACE.steps[currentStep];
  const state = computeState(currentStep);
  const prevState = currentStep > 0 ? computeState(currentStep - 1) : null;

  let html = '';

  
  html += '<div class="nav">';
  html += '<button onclick="go(-1)" id="btn-prev">&larr;</button>';
  html += '<span class="step-info">Step ' + (currentStep + 1) + '/' + TRACE.steps.length + '</span>';
  html += '<button onclick="go(1)" id="btn-next">&rarr;</button>';
  html += '<span class="command">' + escHtml(step.command) + '</span>';
  html += '</div>';

  
  const voterIds = Object.keys(state.voters).sort();
  const hasWitness = state.witness !== null;
  const { positions, arenaW, arenaH } = semicircleLayout(voterIds, hasWitness);

  
  const posMap = {};
  for (const p of positions) {
    posMap[p.id] = { x: p.x + CARD_W / 2, y: p.y + CARD_H / 2 };
  }

  html += '<div class="arena" style="width:' + arenaW + 'px;height:' + arenaH + 'px">';
  
  html += renderMessageArcs(step.messages, posMap, arenaW, arenaH);
  for (const p of positions) {
    if (p.id === 'w') {
      html += renderWitnessCard(state.witness, step, p.x, p.y);
    } else {
      const prev = prevState && prevState.voters[p.id];
      html += renderVoterCard(p.id, state.voters[p.id], step, p.x, p.y, state.voters, prev);
    }
  }
  html += '</div>';

  
  if (step.comment) {
    html += '<div class="comment">' + escHtml(step.comment) + '</div>';
  }

  
  html += '<div class="output-label">input</div>';
  let inputText = step.command;
  if (step.input) inputText += '\n' + step.input;
  html += '<div class="output">' + escHtml(inputText) + '</div>';

  
  html += '<div class="output-label">output</div>';
  html += '<div class="output">' + escHtml(step.output) + '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === TRACE.steps.length - 1;
}

function go(delta) {
  const next = currentStep + delta;
  if (next >= 0 && next < TRACE.steps.length) {
    currentStep = next;
    location.hash = currentStep;
    render();
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});


const hashStep = parseInt(location.hash.slice(1), 10);
if (hashStep >= 0 && hashStep < TRACE.steps.length) currentStep = hashStep;
render();
</script>
</body>
</html>
