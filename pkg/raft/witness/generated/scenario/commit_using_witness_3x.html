<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Witness Test: testdata/scenario/commit_using_witness_3x.txt</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 13px; background: #fafafa; color: #222; padding: 20px; }
h1 { font-size: 14px; color: #888; margin-bottom: 12px; font-weight: normal; }
h1 a { color: #888; text-decoration: none; }
h1 a:hover { text-decoration: underline; }
.nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.nav button { background: #fff; border: 1px solid #ccc; color: #333; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-family: inherit; }
.nav button:hover { background: #eef; }
.nav button:disabled { opacity: 0.4; cursor: default; }
.step-info { color: #666; }
.command { color: #1f6feb; font-weight: bold; }
.comment { color: #2a7a3a; margin-bottom: 12px; white-space: pre-wrap; }
.board { margin-bottom: 16px; }
.row { display: flex; align-items: center; padding: 6px 0; gap: 12px; min-height: 38px; }
.row.down { opacity: 0.45; }
.row.down .label::after { content: ' \00D7'; color: #c0392b; font-weight: bold; }
.row.leader .label::after { content: ' \2655'; color: #c89400; }
.row.stale-leader .label::after { content: ' \2655'; color: #c0392b; }
.row .label { width: 80px; flex-shrink: 0; color: #1f6feb; font-weight: bold; }
.row .label.witness { color: #7d4ec9; }
.row .log { display: flex; gap: 2px; flex-shrink: 0; }
.row .state { margin-left: auto; color: #555; text-align: right; }
.row .state .item { display: inline-block; margin: 0 4px; }
.row .state .sep { color: #bbb; }
.row .state .item.changed { background: #fff4b8; padding: 1px 5px; border-radius: 2px; }
.row .state .key { color: #888; }
.row .state .val { color: #222; }
.row .state .item.changed .key { color: #8a6d00; }
.row .state .item.changed .val { color: #5c4900; font-weight: 600; }
.cell { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        border-radius: 3px; font-size: 12px; font-weight: 400; color: #222;
        border: 1px solid rgba(0,0,0,0.12); }
.cell.changed { font-weight: 800; box-shadow: 0 0 0 2px #d4a800; }
.cell.empty { background: transparent; color: #bbb; border: 1px dashed #ccc; }
.cell.synthetic { font-style: italic; }
.output { background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px; padding: 10px; white-space: pre-wrap; color: #2c2c2c; margin-top: 8px; }
.output-label { color: #888; font-size: 11px; margin-top: 12px; margin-bottom: 4px; }
</style>

<body>
<h1><a href=".././">testdata</a> / <a href="./">scenario</a> / commit_using_witness_3x.txt</h1>
<div id="app"></div>
<script>
const TRACE = {"testFile":"testdata/scenario/commit_using_witness_3x.txt","steps":[{"index":0,"command":"setup","input":"v1: [a1]\nv2: [a1]\nw","comment":"Explore some interesting interactions between two voters and a witness\n(i.e. in 3x configuration).","output":"v1: [a1] term=a\nv2: [a1] term=a","voters":{"v1":{"log":[{"term":"a","index":"1"}],"term":"a","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2 w)","matchIndex":0,"down":false},"v2":{"log":[{"term":"a","index":"1"}],"term":"a","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2 w)","matchIndex":0,"down":false}},"witness":{"vote":{"term":"0","votedFor":"-"},"acked":{"engaged":false},"down":false}},{"index":1,"command":"campaign v1 drop=(w)","comment":"v1 wins election. Witness vote is dropped to hit an interesting case in\nwhich the witness finds out about the leader later. Letting it vote would\nwork too and is unit tested.","output":"v1 campaigns at term b\nv1: yes (self)\nv2:\n  - term advance a -\u003e b\n  - granted vote for v1 at term b\n  yes (term a-\u003eb, voted v1)\nw: (dropped)\noutcome: won","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"}],"term":"b","votedFor":"v1","leader":true,"matchIndex":2},"v2":{"term":"b","votedFor":"v1"}},"messages":[{"from":"v1","to":"v2","type":"VoteReq","label":"VoteReq(term=b, log=a1)"},{"from":"v2","to":"v1","type":"VoteResp","label":"yes","trace":["term advance a -\u003e b","granted vote for v1 at term b"]},{"from":"v1","to":"w","type":"VoteReq","label":"VoteReq(term=b, log=a1)"},{"from":"w","to":"v1","type":"Dropped","label":"(dropped)","dropped":true}]},{"index":2,"command":"set-avail down=(v2)","comment":"v2 goes down.","output":"ok","voters":{"v2":{"down":true}}},{"index":3,"command":"propose v1","comment":"v1 proposes an entry.","output":"v1: [a1 b2 b3] term=b leader\nv2: [a1] term=b","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"b","index":"3"}],"matchIndex":3}}},{"index":4,"command":"append v1","comment":"Since v2 is down, there's no way to commit unless v2 returns or the witness\ncomes into play.","output":"v1 appends through b3\nv2: (dropped)\nv1: [a1 b2 b3] term=b leader\nv2: [a1] term=b","messages":[{"from":"v1","to":"v2","type":"AppendReq","label":"AppendReq([... b3])"},{"from":"v2","to":"v1","type":"Dropped","label":"(dropped)","dropped":true}]},{"index":5,"command":"engage v1","comment":"v1 engages the witness using its last index. The witness promises to \"ack\" the\nlog up to this point, and also any future entries in the term until\ndisengagement. Because (v1+witness) is a quorum, v1 commits its log.","output":"w:\n  - term advance 0 -\u003e b (leader v1)\n  - engaged at b3\n  ok (term 0-\u003eb, voted v1, hi 0-\u003eb3, engaged)\nw:  vote=(b, v1) acked=(b3, engaged)\nv1: [a1 b2 b3] term=b committed=b3 leader","voters":{"v1":{"committed":3,"witnessEngaged":true}},"witness":{"vote":{"term":"b","votedFor":"v1"},"acked":{"hi":{"term":"b","index":"3"},"engaged":true}},"messages":[{"from":"v1","to":"w","type":"Engage","label":"Engage(term=b, hi=b3)"},{"from":"w","to":"v1","type":"WitnessResp","label":"ok","trace":["term advance 0 -\u003e b (leader v1)","engaged at b3"]}]},{"index":6,"command":"set-avail up=(v2) down=(v1)","comment":"v2 comes back, but v1 goes down. We are now unavailable: the witness has the\nmore up to date (fictitious) log, so it won't vote for v2, but it also can't\ncampaign. Also, if v1 were lost permanently (not just unavailable), we'd have\nlost durability. Effectively, (v1+witness) has the durability of a single-voter\ngroup.","output":"ok","voters":{"v1":{"down":true},"v2":{"down":false}}},{"index":7,"command":"prevote v2","comment":"Confirm that witness won't vote for v2. The witness has to assume that v1 has\nmore up to date log entries from the engaged term, and v2's log is not\nobviously up to date with whatever the engaged term's entries might be.","output":"v2 prevotes at term c\nv2: yes (self)\nv1: (dropped)\nw:\n  - engaged: effectiveHi inflated to b∞\n  - rejected vote for v2: log not up to date (effectiveHi b∞ \u003e lm a1)\n  no\noutcome: lost","messages":[{"from":"v2","to":"v1","type":"PreVoteReq","label":"PreVoteReq(term=c, log=a1)"},{"from":"v1","to":"v2","type":"Dropped","label":"(dropped)","dropped":true},{"from":"v2","to":"w","type":"PreVoteReq","label":"PreVoteReq(term=c, log=a1)"},{"from":"w","to":"v2","type":"VoteResp","label":"no","trace":["engaged: effectiveHi inflated to b∞","rejected vote for v2: log not up to date (effectiveHi b∞ \u003e lm a1)"]}]},{"index":8,"command":"set-avail up=(v1) down=(v2)","comment":"v1 comes back up, v2 goes back down.","output":"ok","voters":{"v1":{"down":false},"v2":{"down":true}}},{"index":9,"command":"campaign v1","comment":"v1 could continue using the witness (nothing in the pair's state has changed\nsince it last did) but for extra spice, let's say it power cycled and lost\nleadership. This creates the interesting situation in which v1 re-campaigns,\nand needs a vote from the witness but the witness is still engaged at the\nprior term. It typically wouldn't be able to vote here, but it is able to\nhere because it remembers that the candidate is the leader for the engaged\nterm, which proves that its log is up to date with anything the witness may\nhave helped synthesize acks for.\n\nNote that the witness disengages in the new term, preserving a high water mark\nof b∞ (anything in term b may have been committed with the witness's help).\nThe leader also doesn't consider the witness engaged. It's a new term.","output":"v1 campaigns at term c\nv1: yes (self)\nv2: (dropped)\nw:\n  - engaged: effectiveHi inflated to b∞\n  - engaged leader v1 re-campaigning: skipping log check\n  - granted vote for v1 at term c, hi carried as b∞\n  yes (term b-\u003ec, hi b3-\u003eb∞, released)\noutcome: won","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"b","index":"3"},{"term":"c","index":"4"}],"term":"c","witnessEngaged":false,"matchIndex":4}},"witness":{"vote":{"term":"c"},"acked":{"hi":{"term":"b","index":"∞"},"engaged":false}},"messages":[{"from":"v1","to":"v2","type":"VoteReq","label":"VoteReq(term=c, log=b3)"},{"from":"v2","to":"v1","type":"Dropped","label":"(dropped)","dropped":true},{"from":"v1","to":"w","type":"VoteReq","label":"VoteReq(term=c, log=b3)"},{"from":"w","to":"v1","type":"VoteResp","label":"yes","trace":["engaged: effectiveHi inflated to b∞","engaged leader v1 re-campaigning: skipping log check","granted vote for v1 at term c, hi carried as b∞"]}]},{"index":10,"command":"append v1","comment":"Nobody to append to, i.e. this is a no-op.","output":"v1 appends through c4\nv2: (dropped)\nv1: [a1 b2 b3 c4] term=c committed=b3 leader\nv2: [a1] term=b","messages":[{"from":"v1","to":"v2","type":"AppendReq","label":"AppendReq([... c4])"},{"from":"v2","to":"v1","type":"Dropped","label":"(dropped)","dropped":true}]},{"index":11,"command":"set-avail up=(v2) down=(v1)","comment":"v2 comes back, v1 goes down again. The witness disengaged when it voted for\nv1 at term c, but preserved a high water mark of b∞ — reflecting that it may\nhave helped commit any entry in term b. v2's log (term a) can't prove it\ncovers what the witness helped commit, so the prevote fails.","output":"ok","voters":{"v1":{"down":true},"v2":{"down":false}}},{"index":12,"command":"prevote v2","output":"v2 prevotes at term c\nv2: yes (self)\nv1: (dropped)\nw:\n  - rejected vote for v2: candidate term c \u003c= vote term c (votedFor=v1)\n  no\noutcome: lost","messages":[{"from":"v2","to":"v1","type":"PreVoteReq","label":"PreVoteReq(term=c, log=a1)"},{"from":"v1","to":"v2","type":"Dropped","label":"(dropped)","dropped":true},{"from":"v2","to":"w","type":"PreVoteReq","label":"PreVoteReq(term=c, log=a1)"},{"from":"w","to":"v2","type":"VoteResp","label":"no","trace":["rejected vote for v2: candidate term c \u003c= vote term c (votedFor=v1)"]}]},{"index":13,"command":"set-avail up=(v1)","output":"ok","voters":{"v1":{"down":false}}},{"index":14,"command":"propose v1","comment":"v1 is back. We assume it's still the leader (didn't step down, maybe short\nnetwork partition).\nv1 proposes and replicates to v2, committing via the traditional v1+v2\nquorum — no witness engagement needed.","output":"v1: [a1 b2 b3 c4 c5] term=c committed=b3 leader\nv2: [a1] term=b","voters":{"v1":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"b","index":"3"},{"term":"c","index":"4"},{"term":"c","index":"5"}],"matchIndex":5}}},{"index":15,"command":"append v1","output":"v1 appends through c5\nv2:\n  - term advance b -\u003e c (leader v1)\n  - accepted append through c5 (ok)\n  ok (term b-\u003ec, log=[a1 | b2 b3 c4 c5])\nv1: [a1 b2 b3 c4 c5] term=c committed=c5 leader\nv2: [a1 b2 b3 c4 c5] term=c","voters":{"v1":{"committed":5},"v2":{"log":[{"term":"a","index":"1"},{"term":"b","index":"2"},{"term":"b","index":"3"},{"term":"c","index":"4"},{"term":"c","index":"5"}],"term":"c","votedFor":"-"}},"messages":[{"from":"v1","to":"v2","type":"AppendReq","label":"AppendReq([... c5])"},{"from":"v2","to":"v1","type":"AppendResp","label":"ok","trace":["term advance b -\u003e c (leader v1)","accepted append through c5 (ok)"]}]}]};

let currentStep = 0;

const MAX_CELLS = 10;

function computeState(upTo) {
  const state = { voters: {}, witness: null };
  for (let i = 0; i <= upTo; i++) {
    const step = TRACE.steps[i];
    if (step.voters) {
      for (const [id, delta] of Object.entries(step.voters)) {
        if (!state.voters[id]) state.voters[id] = {};
        for (const [k, v] of Object.entries(delta)) {
          state.voters[id][k] = v;
        }
      }
    }
    if (step.witness) {
      if (!state.witness) state.witness = { vote: {}, acked: {} };
      if (step.witness.vote) {
        for (const [k, v] of Object.entries(step.witness.vote)) {
          state.witness.vote[k] = v;
        }
      }
      if (step.witness.acked) {
        for (const [k, v] of Object.entries(step.witness.acked)) {
          state.witness.acked[k] = v;
        }
      }
      if (step.witness.down !== undefined) {
        state.witness.down = step.witness.down;
      }
    }
  }
  return state;
}




function termBg(t) {
  if (!t || t === '-') return '#e8e8ec';
  let ord = 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') ord = t.charCodeAt(0) - 97;
  else ord = parseInt(t, 10) || 0;
  const hue = (ord * 53) % 360;
  return 'hsl(' + hue + ', 65%, 75%)';
}

function termOrd(t) {
  if (!t || t === '-') return 0;
  if (t.length === 1 && t >= 'a' && t <= 'z') return t.charCodeAt(0) - 96;
  return parseInt(t, 10) || 0;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}



function renderVoterLog(log, prevLog, initial) {
  let html = '<div class="log">';
  if (!log || log.length === 0) {
    html += '<div class="cell empty">·</div>';
  } else {
    for (let i = 0; i < log.length; i++) {
      const e = log[i];
      const prev = prevLog && prevLog[i];
      const changed = !initial && (!prev || prev.term !== e.term || prev.index !== e.index);
      const cls = 'cell' + (changed ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + termBg(e.term) + '">' +
        escHtml(e.index) + '</div>';
    }
  }
  html += '</div>';
  return html;
}








function renderWitnessLog(witness, prevWitness, initial) {
  const hi = witness && witness.acked && witness.acked.hi;
  const engaged = witness && witness.acked && witness.acked.engaged;
  const term = hi ? hi.term : null;
  const idx = hi ? parseInt(hi.index, 10) : 0;

  const prevHi = prevWitness && prevWitness.acked && prevWitness.acked.hi;
  const prevEngaged = prevWitness && prevWitness.acked && prevWitness.acked.engaged;
  const prevTerm = prevHi ? prevHi.term : null;
  const prevIdx = prevHi ? parseInt(prevHi.index, 10) : 0;

  
  const cellChanged = (i) => {
    if (initial) return false;
    if (term !== prevTerm) return true; 
    if (engaged && !prevEngaged) {
      
      return i > prevIdx;
    }
    if (!engaged && prevEngaged) return true; 
    return i > prevIdx;
  };

  let html = '<div class="log">';
  if (!hi && !engaged) {
    html += '<div class="cell empty">·</div></div>';
    return html;
  }
  const bg = termBg(term);
  if (engaged) {
    for (let i = 1; i <= 8; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
    const tailCls = (!initial && engaged && !prevEngaged) ? ' changed' : '';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">…</div>';
    html += '<div class="cell synthetic' + tailCls + '" style="background:' + bg + '">∞</div>';
  } else {
    for (let i = 1; i <= idx; i++) {
      const cls = 'cell' + (cellChanged(i) ? ' changed' : '');
      html += '<div class="' + cls + '" style="background:' + bg + '">' + i + '</div>';
    }
  }
  html += '</div>';
  return html;
}


function voterStateItems(id, voter, step) {
  const items = [];
  const push = (key, val, changed) => items.push({ key, val, changed });
  push('term', voter.term || '-', isVoterChanged(step, id, 'term'));
  if (voter.votedFor && voter.votedFor !== '-') {
    push('votedFor', voter.votedFor, isVoterChanged(step, id, 'votedFor'));
  } else if (isVoterChanged(step, id, 'votedFor')) {
    push('votedFor', '-', true);
  }
  if ((voter.committed || 0) > 0 || isVoterChanged(step, id, 'committed')) {
    push('committed', voter.committed || 0, isVoterChanged(step, id, 'committed'));
  }
  if (voter.witnessEngaged) {
    push('witnessEngaged', 'yes', isVoterChanged(step, id, 'witnessEngaged'));
  } else if (isVoterChanged(step, id, 'witnessEngaged')) {
    push('witnessEngaged', 'no', true);
  }
  return items;
}

function witnessStateItems(witness, step) {
  const items = [];
  const initial = currentStep === 0;
  const voteTermChanged = !initial && step.witness && step.witness.vote && step.witness.vote.term !== undefined;
  const voteForChanged = !initial && step.witness && step.witness.vote && step.witness.vote.votedFor !== undefined;
  const hiChanged = !initial && step.witness && step.witness.acked && step.witness.acked.hi !== undefined;
  const engagedChanged = !initial && step.witness && step.witness.acked && step.witness.acked.engaged !== undefined;

  items.push({
    key: 'voteTerm', val: witness.vote.term || '-', changed: !!voteTermChanged,
  });
  items.push({
    key: 'votedFor', val: witness.vote.votedFor || '-', changed: !!voteForChanged,
  });
  if (witness.acked.hi) {
    items.push({
      key: 'hi', val: witness.acked.hi.term + witness.acked.hi.index, changed: !!hiChanged,
    });
  }
  items.push({
    key: 'engaged', val: witness.acked.engaged ? 'yes' : 'no', changed: !!engagedChanged,
  });
  return items;
}

function fmtStateItems(items) {
  return items.map(it => {
    const cls = 'item' + (it.changed ? ' changed' : '');
    return '<span class="' + cls + '"><span class="key">' + escHtml(it.key) + '=</span>' +
      '<span class="val">' + escHtml(it.val) + '</span></span>';
  }).join('<span class="sep">,</span>');
}

function isVoterChanged(step, id, field) {
  if (currentStep === 0) return false; 
  return step.voters && step.voters[id] && step.voters[id][field] !== undefined;
}

function renderVoterRow(id, voter, step, prevVoter, allVoters) {
  let cls = 'row';
  if (voter.down) cls += ' down';
  if (voter.leader) {
    const stale = Object.values(allVoters).some(
      v => v !== voter && termOrd(v.term) > termOrd(voter.term)
    );
    cls += stale ? ' stale-leader' : ' leader';
  }
  let html = '<div class="' + cls + '" data-id="' + id + '">';
  html += '<div class="label">' + escHtml(id) + '</div>';
  html += renderVoterLog(voter.log, prevVoter ? prevVoter.log : null, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(voterStateItems(id, voter, step)) + '</div>';
  html += '</div>';
  return html;
}

function renderWitnessRow(witness, step, prevWitness) {
  let cls = 'row';
  if (witness.down) cls += ' down';
  let html = '<div class="' + cls + '" data-id="w">';
  html += '<div class="label witness">w</div>';
  html += renderWitnessLog(witness, prevWitness, currentStep === 0);
  html += '<div class="state">' + fmtStateItems(witnessStateItems(witness, step)) + '</div>';
  html += '</div>';
  return html;
}

function render() {
  const step = TRACE.steps[currentStep];
  const state = computeState(currentStep);
  const prevState = currentStep > 0 ? computeState(currentStep - 1) : null;

  let html = '';

  
  html += '<div class="nav">';
  html += '<button onclick="go(-1)" id="btn-prev">&larr;</button>';
  html += '<span class="step-info">Step ' + (currentStep + 1) + '/' + TRACE.steps.length + '</span>';
  html += '<button onclick="go(1)" id="btn-next">&rarr;</button>';
  html += '<span class="command">' + escHtml(step.command) + '</span>';
  html += '</div>';

  
  html += '<div class="board">';
  const voterIds = Object.keys(state.voters).sort();
  for (const id of voterIds) {
    const prev = prevState && prevState.voters[id];
    html += renderVoterRow(id, state.voters[id], step, prev, state.voters);
  }
  if (state.witness) {
    html += renderWitnessRow(state.witness, step, prevState && prevState.witness);
  }
  html += '</div>';

  
  if (step.comment) {
    html += '<div class="comment">' + escHtml(step.comment) + '</div>';
  }

  
  html += '<div class="output-label">input</div>';
  let inputText = step.command;
  if (step.input) inputText += '\n' + step.input;
  html += '<div class="output">' + escHtml(inputText) + '</div>';

  
  html += '<div class="output-label">output</div>';
  html += '<div class="output">' + escHtml(step.output) + '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === TRACE.steps.length - 1;
}

function go(delta) {
  const next = currentStep + delta;
  if (next >= 0 && next < TRACE.steps.length) {
    currentStep = next;
    location.hash = currentStep;
    render();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});


const hashStep = parseInt(location.hash.slice(1), 10);
if (hashStep >= 0 && hashStep < TRACE.steps.length) currentStep = hashStep;
render();
</script>
