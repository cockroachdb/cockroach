<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Witness Test: testdata/scenario/commit_using_witness.txt</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { font-size: 14px; color: #7f8c8d; margin-bottom: 12px; font-weight: normal; }
.nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.nav button { background: #2d2d44; border: 1px solid #444; color: #ccc; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-family: inherit; }
.nav button:hover { background: #3d3d54; }
.nav button:disabled { opacity: 0.3; cursor: default; }
.step-info { color: #aaa; }
.command { color: #82aaff; font-weight: bold; }
.comment { color: #6a9955; margin-bottom: 12px; white-space: pre-wrap; }
.cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.card { background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 12px; min-width: 200px; flex: 1; }
.card h2 { font-size: 13px; color: #82aaff; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
.card .field { display: flex; justify-content: space-between; padding: 2px 0; }
.card .field .key { color: #888; }
.card .field .val { color: #e0e0e0; }
.card .field.changed .val { color: #ffd700; background: rgba(255,215,0,0.1); padding: 0 4px; border-radius: 2px; }
.card .field.changed .key { color: #ffd700; }
.log-entries { color: #e0e0e0; word-break: break-all; }
.log-entries.changed { color: #ffd700; background: rgba(255,215,0,0.1); padding: 0 4px; border-radius: 2px; }
.output { background: #0d1117; border: 1px solid #333; border-radius: 4px; padding: 10px; white-space: pre-wrap; color: #c9d1d9; margin-top: 8px; }
.output-label { color: #666; font-size: 11px; margin-top: 12px; margin-bottom: 4px; }
</style>
</head>
<body>
<h1>testdata/scenario/commit_using_witness.txt</h1>
<div id="app"></div>
<script>
const TRACE = {"testFile":"testdata/scenario/commit_using_witness.txt","steps":[{"index":0,"command":"setup","input":"v1: [a1]\nv2: [a1]\nw","comment":"A voter goes down. The leader engages the witness to maintain commit quorum,\nthen later releases it and transitions back to voter-based commits.\n#\nTwo voters, one witness. Quorum = 2.","output":"v1: [a1] term=a\nv2: [a1] term=a","voters":{"v1":{"log":[{"term":"a","index":1}],"term":"a","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2 w)","matchIndex":0},"v2":{"log":[{"term":"a","index":1}],"term":"a","votedFor":"-","leader":false,"committed":0,"witnessEngaged":false,"cfg":"(v1 v2 w)","matchIndex":0}},"witness":{"vote":{"term":"0","votedFor":"-"},"acked":{"engaged":false}}},{"index":1,"command":"campaign v1 drop=(w)","comment":"v1 wins election. Witness vote is dropped to keep setup minimal.","output":"v1 campaigns at term b\nv1: yes (self)\nv2: yes\nw:  (dropped)\noutcome: won","voters":{"v1":{"log":[{"term":"a","index":1},{"term":"b","index":2}],"term":"b","votedFor":"v1","leader":true,"matchIndex":2},"v2":{"term":"b","votedFor":"v1"}}},{"index":2,"command":"propose v1","comment":"v1 proposes an entry. v2 is down (partitioned from here on).\nMatches: [v1=3, v2=0, w=0]. Quorum match = 0, not committed.","output":"v1: [a1 b2 b3] term=b leader\nv2: [a1] term=b","voters":{"v1":{"log":[{"term":"a","index":1},{"term":"b","index":2},{"term":"b","index":3}],"matchIndex":3}}},{"index":3,"command":"append v1 drop=(v2)","output":"v1 appends through b3\nv2: (dropped)\nv1: [a1 b2 b3] term=b leader\nv2: [a1] term=b"},{"index":4,"command":"engage v1","comment":"v1 engages the witness. Now it counts toward quorum.\nMatches: [v1=3, v2=0, w=3]. Quorum match = 3, committed!","output":"ok\nw:  vote=(b, -) acked=(b3, engaged)\nv1: [a1 b2 b3] term=b committed=b3 leader","voters":{"v1":{"committed":3,"witnessEngaged":true}},"witness":{"vote":{"term":"b"},"acked":{"hi":{"term":"b","index":3},"engaged":true}}},{"index":5,"command":"prevote v2 drop=(v1)","comment":"v2 prevotes (v1 partitioned away). The witness rejects: v2's last log entry\na1 is from term a, which is older than the term b leader that engaged the\nwitness. Without proof that a post-engagement leader was elected, granting a\nvote could let v2 form a quorum that misses entries the witness helped commit.","output":"v2 prevotes at term c\nv2: yes (self)\nv1: (dropped)\nw:  no\noutcome: lost"},{"index":6,"command":"propose v1","comment":"Propose and replicate another entry while the witness is still engaged. This\none commits immediately (witness match advances with the leader's log).","output":"v1: [a1 b2 b3 b4] term=b committed=b4 leader\nv2: [a1] term=b","voters":{"v1":{"log":[{"term":"a","index":1},{"term":"b","index":2},{"term":"b","index":3},{"term":"b","index":4}],"committed":4,"matchIndex":4}}},{"index":7,"command":"append v1 drop=(v2)","output":"v1 appends through b4\nv2: (dropped)\nv1: [a1 b2 b3 b4] term=b committed=b4 leader\nv2: [a1] term=b"},{"index":8,"command":"release v1","comment":"v1 releases the witness, returning to voter-based commits. Note that the\nwitness reflects the updated high water mark, i.e. it knows the highest\nposition it has helped commit.","output":"ok\nw:  vote=(b, -) acked=(b4, released)","voters":{"v1":{"witnessEngaged":false}},"witness":{"acked":{"hi":{"term":"b","index":4},"engaged":false}}},{"index":9,"command":"prevote v2 drop=(v1)","comment":"v2 prevotes again after the release. The witness is no longer engaged, but\nits acked high-water mark b4 is still ahead of v2's last log entry a1. The\nwitness won't vote for a candidate whose log doesn't cover what it has acked.","output":"v2 prevotes at term c\nv2: yes (self)\nv1: (dropped)\nw:  no\noutcome: lost"},{"index":10,"command":"propose v1","comment":"v2 comes back online. v1 proposes and replicates to v2, committing via the\ntraditional v1+v2 quorum — no witness engagement needed.","output":"v1: [a1 b2 b3 b4 b5] term=b committed=b4 leader\nv2: [a1] term=b","voters":{"v1":{"log":[{"term":"a","index":1},{"term":"b","index":2},{"term":"b","index":3},{"term":"b","index":4},{"term":"b","index":5}],"matchIndex":5}}},{"index":11,"command":"append v1","output":"v1 appends through b5\nv2: ok\nv1: [a1 b2 b3 b4 b5] term=b committed=b5 leader\nv2: [a1 b2 b3 b4 b5] term=b","voters":{"v1":{"committed":5},"v2":{"log":[{"term":"a","index":1},{"term":"b","index":2},{"term":"b","index":3},{"term":"b","index":4},{"term":"b","index":5}]}}}]};

let currentStep = 0;

function computeState(upTo) {
  const state = { voters: {}, witness: null };
  for (let i = 0; i <= upTo; i++) {
    const step = TRACE.steps[i];
    if (step.voters) {
      for (const [id, delta] of Object.entries(step.voters)) {
        if (!state.voters[id]) state.voters[id] = {};
        for (const [k, v] of Object.entries(delta)) {
          state.voters[id][k] = v;
        }
      }
    }
    if (step.witness) {
      if (!state.witness) state.witness = { vote: {}, acked: {} };
      if (step.witness.vote) {
        for (const [k, v] of Object.entries(step.witness.vote)) {
          state.witness.vote[k] = v;
        }
      }
      if (step.witness.acked) {
        for (const [k, v] of Object.entries(step.witness.acked)) {
          state.witness.acked[k] = v;
        }
      }
    }
  }
  return state;
}

function isChanged(step, replicaId, field) {
  if (replicaId === 'w') {
    if (!step.witness) return false;
    if (field.startsWith('vote.')) return step.witness.vote && step.witness.vote[field.slice(5)] !== undefined;
    if (field.startsWith('acked.')) return step.witness.acked && step.witness.acked[field.slice(6)] !== undefined;
    return false;
  }
  return step.voters && step.voters[replicaId] && step.voters[replicaId][field] !== undefined;
}

function fmtLog(log) {
  if (!log || log.length === 0) return '(empty)';
  return log.map(e => e.term + e.index).join(' ');
}

function fmtLogMark(lm) {
  if (!lm) return '-';
  return lm.term + lm.index;
}

function renderVoterCard(id, voter, step) {
  const f = (key, val) => {
    const cls = isChanged(step, id, key) ? ' changed' : '';
    return '<div class="field' + cls + '"><span class="key">' + key + '</span><span class="val">' + val + '</span></div>';
  };
  const logCls = isChanged(step, id, 'log') ? ' changed' : '';
  let html = '<div class="card"><h2>' + id + '</h2>';
  html += '<div class="field"><span class="key">log</span><span class="log-entries' + logCls + '">' + fmtLog(voter.log) + '</span></div>';
  html += f('term', voter.term || '-');
  html += f('votedFor', voter.votedFor || '-');
  html += f('leader', voter.leader ? 'yes' : 'no');
  html += f('committed', voter.committed || 0);
  if (voter.witnessEngaged) html += f('witnessEngaged', 'yes');
  html += '</div>';
  return html;
}

function renderWitnessCard(witness, step) {
  if (!witness) return '';
  const f = (field, val) => {
    const cls = isChanged(step, 'w', field) ? ' changed' : '';
    return '<div class="field' + cls + '"><span class="key">' + field.split('.')[1] + '</span><span class="val">' + val + '</span></div>';
  };
  let html = '<div class="card"><h2>w (witness)</h2>';
  html += '<div style="color:#666;font-size:11px;margin-bottom:4px">vote</div>';
  html += f('vote.term', witness.vote.term || '-');
  html += f('vote.votedFor', witness.vote.votedFor || '-');
  html += '<div style="color:#666;font-size:11px;margin-top:6px;margin-bottom:4px">acked</div>';
  html += f('acked.hi', witness.acked.hi ? fmtLogMark(witness.acked.hi) : '-');
  html += f('acked.engaged', witness.acked.engaged ? 'yes' : 'no');
  html += '</div>';
  return html;
}

function render() {
  const step = TRACE.steps[currentStep];
  const state = computeState(currentStep);

  let html = '';

  
  html += '<div class="nav">';
  html += '<button onclick="go(-1)" id="btn-prev">&larr;</button>';
  html += '<span class="step-info">Step ' + (currentStep + 1) + '/' + TRACE.steps.length + '</span>';
  html += '<button onclick="go(1)" id="btn-next">&rarr;</button>';
  html += '<span class="command">' + escHtml(step.command) + '</span>';
  html += '</div>';

  
  html += '<div class="cards">';
  const voterIds = Object.keys(state.voters).sort();
  for (const id of voterIds) {
    html += renderVoterCard(id, state.voters[id], step);
  }
  if (state.witness) {
    html += renderWitnessCard(state.witness, step);
  }
  html += '</div>';

  
  if (step.comment) {
    html += '<div class="comment">' + escHtml(step.comment) + '</div>';
  }

  
  html += '<div class="output-label">input</div>';
  let inputText = step.command;
  if (step.input) inputText += '\n' + step.input;
  html += '<div class="output">' + escHtml(inputText) + '</div>';

  
  html += '<div class="output-label">output</div>';
  html += '<div class="output">' + escHtml(step.output) + '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === TRACE.steps.length - 1;
}

function go(delta) {
  const next = currentStep + delta;
  if (next >= 0 && next < TRACE.steps.length) {
    currentStep = next;
    render();
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});

render();
</script>
</body>
</html>
