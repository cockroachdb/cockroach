syntax = "proto3";
package cockroach.ccl.utilccl.licenseccl;
option go_package = "github.com/cockroachdb/cockroach/pkg/server/license/licensepb";

import "gogoproto/gogo.proto";

message License {
    reserved 1;
    int64 valid_until_unix_sec = 2;

    enum Type {
      NonCommercial = 0 [deprecated = true];
      Enterprise = 1;
      Evaluation = 2;
      Free = 3;
      Trial = 4;
    }

    Type type = 3;

    string organization_name = 4;

    enum Environment {
      option (gogoproto.goproto_enum_prefix) = false;
      option (gogoproto.goproto_enum_stringer) = false;

      Unspecified = 0;
      Production = 1;
      PreProduction = 2;
      Development = 3;
    }

    Environment environment = 5;

    // Two UUIDs uniquely identify this license and the associated organization.
    // They are stored as bytes to align with the server's typical usage. We
    // avoided using the custom UUID type normally used in protobufs to minimize
    // dependencies, as the generated code is also used in other repositories.
    bytes license_id = 6;
    bytes organization_id = 7;

    // Edition defines the capability tier of the license. Orthogonal to Type,
    // which represents the commercial relationship (Enterprise, Trial, etc.).
    enum Edition {
      option (gogoproto.goproto_enum_stringer) = false;

      EDITION_UNSPECIFIED = 0;
      STANDARD = 1;
      ENTERPRISE_EDITION = 2;
      MISSION_CRITICAL = 3;
    }

    // AddOn defines optional feature bundles purchasable on top of an edition.
    enum AddOn {
      option (gogoproto.goproto_enum_stringer) = false;

      ADD_ON_UNSPECIFIED = 0;
      DATA_REPLICATION = 1;
      ADVANCED_WORKLOAD_MGMT = 2;
      DATA_SYNCHRONIZATION = 3;
      ADVANCED_COMPLIANCE = 4;
    }

    Edition edition = 8;
    repeated AddOn add_ons = 9;
    int32 vcpu_entitled = 10;
}
