syntax = "proto3";
package cockroach.ccl.utilccl.licenseccl;
option go_package = "github.com/cockroachdb/cockroach/pkg/server/license/licensepb";

import "gogoproto/gogo.proto";

// Feature enumerates the entitlements a license can grant. A license carries
// the subset of these features that the holder is permitted to use, allowing
// the binary to gate functionality based on what the customer has purchased.
enum Feature {
    FEATURE_UNSPECIFIED = 0;
    CHANGEFEED = 1;
    BACKUP = 2;
    RESTORE = 3;
    EXPORT = 4;
    IMPORT = 5;
    MULTIREGION = 6;
    LDR_BIDIRECTIONAL = 7;
    PCR_MULTIREGION = 8;
}

message License {
    reserved 1;
    int64 valid_until_unix_sec = 2;

    enum Type {
      NonCommercial = 0 [deprecated = true];
      Enterprise = 1;
      Evaluation = 2;
      Free = 3;
      Trial = 4;
    }

    Type type = 3;

    string organization_name = 4;

    enum Environment {
      option (gogoproto.goproto_enum_prefix) = false;
      option (gogoproto.goproto_enum_stringer) = false;

      Unspecified = 0;
      Production = 1;
      PreProduction = 2;
      Development = 3;
    }

    Environment environment = 5;

    // Two UUIDs uniquely identify this license and the associated organization.
    // They are stored as bytes to align with the server's typical usage. We
    // avoided using the custom UUID type normally used in protobufs to minimize
    // dependencies, as the generated code is also used in other repositories.
    bytes license_id = 6;
    bytes organization_id = 7;

    // features lists the entitlements this license grants its holder. Field
    // number 12 is chosen to stay wire-compatible with the managed-service
    // proto, which already uses field numbers 8 through 11.
    repeated Feature features = 12;
}
