name: github-dlq-replay

on:
  pull_request:
    paths: ['pkg/cmd/roachtest/dlq/**']
  push:
    branches: [master]
    paths: ['pkg/cmd/roachtest/dlq/**']

permissions:
  contents: read
  id-token: write

env:
  IMAGE: us-east1-docker.pkg.dev/cockroach-testeng-infra/github-dlq/replay

jobs:
  build:
    if: github.repository == 'cockroachdb/cockroach'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Bazel cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-dlq-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-dlq-

      - name: Build binary
        run: ./dev build pkg/cmd/roachtest/dlq/test_server

      - name: Copy binary to Docker context
        run: cp bin/test_server pkg/cmd/roachtest/dlq/test_server/

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} pkg/cmd/roachtest/dlq/test_server

      - name: Authenticate to GCP
        if: github.event_name == 'push'
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3
        with:
          # TODO: Create WIF pool and service account in cockroach-testeng-infra.
          workload_identity_provider: 'projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL>/providers/<PROVIDER>'
          service_account: 'github-dlq-replay@cockroach-testeng-infra.iam.gserviceaccount.com'

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker us-east1-docker.pkg.dev

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
